query GetDoctors {
  doctors {
    id
    title
    firstName
    lastName
    fullName
    profilePictureUrl
    primarySpecialty {
      id
      name
    }
    subSpecialties {
      id
      name
    }
    teleconsultPrice
    clinicVisitPrice
    homecarePrice
    takesPrepaidPayment
    takesPostpaidPayment
    insuarance {
      id
      name
      logoUrl
    }
    county {
      name
      country {
        name
      }
    }
  }
}
