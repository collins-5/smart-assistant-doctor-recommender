query GetDoctorWithAvailableSlots($id: Int!, $date: Date!) {
  doctor(id: $id) {
    id
    title
    bio
    firstName
    lastName
    fullName
    profilePictureUrl
    takesPrepaidPayment
    takesPostpaidPayment
    teleconsultPrice
    clinicVisitPrice
    homecarePrice
    primarySpecialty {
      id
      name
    }
    subSpecialties {
      id
      name
    }
    insuarance {
      id
      name
      logoUrl
    }
    user {
      phoneNumber
      email
    }
    county {
      name
      country {
        name
      }
    }

    availableSlots(startDate: $date, endDate: $date) {
      id
      doctorId
      startTime
      endTime
      isBooked
      isRecurring
    }
  }
}
