mutation BookAppointment($bookingArgs: AppointmentInput!) {
  bookAppointment(bookingArgs: $bookingArgs) {
    success           
    message           
    appointment {
      id
      rastucId
      startTime
      endTime         
      encounterMode
      cost            
      status
      doctor {
        id
        fullName
        title
        primarySpecialty {
          name
        }
      }
      patient {       
        id
        firstName
        lastName
      }
    }
  }
}